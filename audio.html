<section>
  <h2>Here are the audios for six common questions to help you pronounce them correctly:</h2>

  <h3>First Question</h3>
  <figcaption>English: "Which part of the country are you from?"</figcaption>
  <audio controls src="audio10.mp3"></audio>
  <figcaption>Tok Pisin: "Yu bilong wanem hap bilong kantri?"</figcaption>
  <audio controls src="audio1.mp3"></audio>

  <h3>Second Question</h3>
  <figcaption>English: "How long have you been in [current location]?"</figcaption>
  <audio controls src="audio4.mp3"></audio>
  <figcaption>Tok Pisin: "Yu stap long [nau ples] inap hamas yia pinis?"</figcaption>
  <audio controls src="audio6.mp3"></audio>

  <h3>Third Question</h3>
  <figcaption>English: "Have you traveled to any other countries?"</figcaption>
  <audio controls src="audio12.mp3"></audio>
  <figcaption>Tok Pisin: "Yu bin raun long ol narapela kantri pinis?"</figcaption>
  <audio controls src="audio5.mp3"></audio>

  <h3>Fourth Question</h3>
  <figcaption>English: "What is your currency?"</figcaption>
  <audio controls src="audio9.mp3"></audio>
  <figcaption>Tok Pisin: "Yu save yusim wanem kain mani?"</figcaption>
  <audio controls src="audio2.mp3"></audio>

  <h3>Fifth Question</h3>
  <figcaption>English: "What is your name?"</figcaption>
  <audio controls src="audio13.mp3"></audio>
  <figcaption>Tok Pisin: "Wanem nem bilong yu?"</figcaption>
  <audio controls src="audio15.mp3"></audio>

  <h3>Sixth Question</h3>
  <figcaption>English: "What is your common language?"</figcaption>
  <audio controls src="audio14.mp3"></audio>
  <figcaption>Tok Pisin: "Wanem tok ples yupela olgeta sa tok tok?"</figcaption>
  <audio controls src="audio16.mp3"></audio>
